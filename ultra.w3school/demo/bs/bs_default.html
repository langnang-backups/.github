<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap 5 实例</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="../../lib/bs/sass_functions_selector.asp.css" tppabs="https://www.w3school.com.cn/lib/bs/bootstrap.css" rel="stylesheet">
  <script src="../../lib/bs/css3_masking.asp" tppabs="https://www.w3school.com.cn/lib/bs/bootstrap.js"></script>
</head>
<style>
p {
font-size: 12px;
}
</style>
<body>

<div class="container-fluid p-5 bg-primary text-white text-center">
  <h1>我的第一张 Bootstrap 页面</h1>
</div>

<div class="container mt-5">
  <div class="row">
    <div class="col-sm-4">
      <h3>列 1：春日</h3>
      <p>胜日寻芳泗水滨，无边光景一时新。</p>
      <p>等闲识得东风面，万紫千红总是春。</p>
    </div>
    <div class="col-sm-4">
      <h3>列 2：初夏绝句</h3>
      <p>纷纷红紫已成尘，布谷声中夏令新。</p>
      <p>夹路桑麻行不尽，始知身是太平人。</p>
    </div>
    <div class="col-sm-4">
      <h3>列 3：山行</h3>        
      <p>远上寒山石径斜，白云生处有人家。</p>
      <p>停车坐爱枫林晚，霜叶红于二月花。</p>
    </div>
  </div>
</div>

</body>
</html>
